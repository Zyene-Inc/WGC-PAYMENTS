<header
  class="sticky top-0 z-50 w-full bg-white border-b border-wgc-navy-50 shadow-sm transition-all duration-300">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center py-4 md:py-6">

      <!-- Logo -->
      <a routerLink="/" (click)="closeMenu()" class="block flex-shrink-0 group">
        <img src="/wgc-logo.svg" alt="Waypoint Gateway Collective"
          class="h-[60px] md:h-[75px] w-auto transition-transform group-hover:scale-105 duration-500">
      </a>

      <!-- Right Align: Navigation + CTA -->
      <div class="hidden md:flex items-center gap-10">
        <!-- Desktop Navigation -->
        <nav class="flex items-center space-x-8">
          <a routerLink="/" routerLinkActive="text-wgc-gold-600 font-black"
            [routerLinkActiveOptions]="{exact: true}"
            class="text-[12px] uppercase tracking-[0.2em] font-black text-wgc-navy-950 hover:text-black transition-all">Home</a>
          <a routerLink="/software-partners" routerLinkActive="text-wgc-gold-600 font-black"
            class="text-[12px] uppercase tracking-[0.2em] font-black text-wgc-navy-950 hover:text-black transition-all">Partners</a>
          <a routerLink="/pricing" routerLinkActive="text-wgc-gold-600 font-black"
            class="text-[12px] uppercase tracking-[0.2em] font-black text-wgc-navy-950 hover:text-black transition-all">Pricing</a>
          <a routerLink="/developers" routerLinkActive="text-wgc-gold-600 font-black"
            class="text-[12px] uppercase tracking-[0.2em] font-black text-wgc-navy-950 hover:text-black transition-all">Developers</a>
          <a routerLink="/resources" routerLinkActive="text-wgc-gold-600 font-black"
            class="text-[12px] uppercase tracking-[0.2em] font-black text-wgc-navy-950 hover:text-black transition-all">Resources</a>
          <a routerLink="/demo/donation" routerLinkActive="text-wgc-gold-600 font-black"
            class="text-[12px] uppercase tracking-[0.2em] font-black text-wgc-navy-950 hover:text-black transition-all">Demo</a>
        </nav>

        <!-- Desktop CTA -->
        <div class="flex items-center gap-6">
        <ng-container *ngIf="!(authService.currentUser$ | async); else authButtons">
          <a routerLink="/login"
            class="text-[11px] font-black text-wgc-navy-950 hover:text-black transition-all uppercase tracking-[0.2em]">
            Login
          </a>
          <a routerLink="/register"
            class="bg-wgc-gold-500 text-wgc-navy-950 px-8 py-3.5 rounded-2xl text-[11px] font-black shadow-lg shadow-wgc-gold-500/20 hover:bg-black hover:text-white hover:scale-105 active:scale-95 transition-all uppercase tracking-widest">
            Get Started
          </a>
        </ng-container>
        <ng-template #authButtons>
          <a routerLink="/dashboard"
            class="bg-wgc-navy-950 text-white px-8 py-3.5 rounded-2xl text-[11px] font-black shadow-xl hover:bg-black hover:scale-105 active:scale-95 transition-all uppercase tracking-widest">
            Go to Console
          </a>
        </ng-template>
        </div>
      </div>

      <!-- Mobile menu button -->
      <div class="flex items-center md:hidden">
        <button type="button" (click)="toggleMenu()"
          class="inline-flex items-center justify-center p-2 rounded-xl text-wgc-navy-950 hover:bg-wgc-off transition-all">
          <span class="sr-only">Open main menu</span>
          <lucide-icon *ngIf="!isMobileMenuOpen()" [img]="Menu" class="block h-6 w-6"></lucide-icon>
          <lucide-icon *ngIf="isMobileMenuOpen()" [img]="X" class="block h-6 w-6"></lucide-icon>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile menu -->
  <div class="md:hidden" [ngClass]="{'block': isMobileMenuOpen(), 'hidden': !isMobileMenuOpen()}">
    <div class="px-4 pt-4 pb-12 space-y-2 bg-white shadow-2xl border-t border-wgc-navy-50">
      <a routerLink="/" routerLinkActive="bg-wgc-gold-50 text-wgc-gold-600"
        [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()"
        class="text-wgc-navy-950 hover:bg-wgc-off block px-6 py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] transition-all">Home</a>
      <a routerLink="/software-partners" routerLinkActive="bg-wgc-gold-50 text-wgc-gold-600"
        (click)="closeMenu()"
        class="text-wgc-navy-950 hover:bg-wgc-off block px-6 py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] transition-all">Partners</a>
      <a routerLink="/pricing" routerLinkActive="bg-wgc-gold-50 text-wgc-gold-600" (click)="closeMenu()"
        class="text-wgc-navy-950 hover:bg-wgc-off block px-6 py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] transition-all">Pricing</a>
      <a routerLink="/developers" routerLinkActive="bg-wgc-gold-50 text-wgc-gold-600" (click)="closeMenu()"
        class="text-wgc-navy-950 hover:bg-wgc-off block px-6 py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] transition-all">Developers</a>
      <a routerLink="/resources" routerLinkActive="bg-wgc-gold-50 text-wgc-gold-600" (click)="closeMenu()"
        class="text-wgc-navy-950 hover:bg-wgc-off block px-6 py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] transition-all">Resources</a>
      <a routerLink="/demo/donation" routerLinkActive="bg-wgc-gold-50 text-wgc-gold-600" (click)="closeMenu()"
        class="text-wgc-navy-950 hover:bg-wgc-off block px-6 py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] transition-all">Demo Flow</a>

      <div class="mt-8 pt-8 border-t border-wgc-navy-50">
        <ng-container *ngIf="!(authService.currentUser$ | async); else mobileAuthButtons">
          <a routerLink="/login" (click)="closeMenu()"
            class="w-full mb-4 flex items-center justify-center px-6 py-4 border border-wgc-navy-100 rounded-2xl text-[10px] font-black text-wgc-navy-950 bg-wgc-off uppercase tracking-widest transition-all active:scale-95">
            Institutional Login
          </a>
          <a routerLink="/register" (click)="closeMenu()"
            class="w-full flex items-center justify-center px-6 py-4 bg-wgc-gold-500 rounded-2xl text-[10px] font-black text-wgc-navy-950 shadow-lg shadow-wgc-gold-500/20 uppercase tracking-widest transition-all active:scale-95">
            Partner Registration
          </a>
        </ng-container>
        <ng-template #mobileAuthButtons>
          <a routerLink="/dashboard" (click)="closeMenu()"
            class="w-full flex items-center justify-center px-6 py-4 bg-wgc-navy-950 rounded-2xl text-[10px] font-black text-white shadow-xl uppercase tracking-widest">
            Institutional Console
          </a>
        </ng-template>
      </div>
    </div>
  </div>
</header>
