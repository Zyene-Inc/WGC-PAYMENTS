<div class="p-10 bg-wgc-navy-900 rounded-[2rem] border border-wgc-navy-800 shadow-premium hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 h-full flex flex-col group">

    <lucide-icon [img]="icon" class="w-7 h-7"></lucide-icon>
  </div>
  <h3 class="text-xl font-black text-white mb-4 tracking-tight uppercase leading-tight">{{ title }}</h3>
  <p class="text-wgc-navy-200 leading-relaxed text-[15px] font-black uppercase tracking-tight opacity-80">

  </p>
