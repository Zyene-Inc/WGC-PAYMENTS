<div class="bg-wgc-navy-950 relative py-28 lg:py-32 overflow-hidden border-t border-wgc-navy-800 shadow-2xl">
  <!-- Subtle decorative elements -->
  <div class="absolute inset-0 opacity-[0.05]">
    <svg class="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2" width="100%" height="100%" fill="none">
      <defs>
        <pattern id="cta-pattern-new" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
          <circle cx="3" cy="3" r="1.5" class="text-wgc-gold-500" fill="currentColor" />
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#cta-pattern-new)" />
    </svg>
  </div>

  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
    <h2 class="text-5xl font-black tracking-tighter text-white sm:text-6xl lg:text-7xl mb-8 uppercase leading-none">
      {{ headline }}
    </h2>
    <p class="mt-6 text-xl text-wgc-navy-200 max-w-2xl mx-auto mb-12 leading-relaxed font-black uppercase tracking-tight opacity-80">
      {{ subheadline }}
    </p>
    <a [routerLink]="ctaLink" class="bg-wgc-gold-500 text-wgc-navy-950 inline-flex items-center justify-center px-12 py-5 text-base font-black rounded-2xl shadow-2xl shadow-wgc-gold-500/20 transform transition-all hover:scale-105 active:scale-95 uppercase tracking-widest">
      {{ ctaText }}
    </a>
  </div>
</div>
