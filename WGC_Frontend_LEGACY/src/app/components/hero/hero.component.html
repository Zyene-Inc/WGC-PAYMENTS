<div [ngClass]="{
  'bg-white relative overflow-hidden': bgStyle === 'default' || bgStyle === 'transparent',
  'bg-wgc-white relative overflow-hidden border-b border-wgc-navy-100': bgStyle === 'gradient'
}">
  
  <!-- Reverted subtle background pattern -->
  <div class="absolute inset-0 opacity-5 pointer-events-none" *ngIf="bgStyle !== 'transparent'">
    <!-- Simple stable pattern or empty -->
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 lg:py-32 relative z-10">
    <div class="lg:grid lg:grid-cols-12 lg:gap-8 items-center">
      
      <!-- Text Content -->
      <div class="sm:text-center md:max-w-2xl md:mx-auto lg:col-span-6 lg:text-left">
        <div class="inline-flex items-center px-3 py-1 rounded-full bg-wgc-gold-500/10 text-wgc-gold-600 text-[10px] font-bold tracking-[0.2em] uppercase mb-6 border border-wgc-gold-500/20" *ngIf="eyebrow">
          {{ eyebrow }}
        </div>
        
        <h1 class="text-4xl tracking-tight font-extrabold sm:text-5xl md:text-6xl lg:text-[4.5rem] lg:leading-[1.1] mb-8"
            [ngClass]="bgStyle === 'gradient' ? 'text-wgc-navy-900' : 'text-wgc-navy-900'">
          {{ headline }}
        </h1>
        
        <p class="mt-3 text-base sm:mt-5 sm:text-lg sm:max-w-xl sm:mx-auto md:mt-5 md:text-xl lg:mx-0 leading-relaxed font-medium"
           [ngClass]="bgStyle === 'gradient' ? 'text-wgc-navy-600' : 'text-wgc-navy-400'">
          {{ subheadline }}
        </p>
        
        <div class="mt-8 sm:mt-10 sm:flex sm:justify-center lg:justify-start gap-4">
          <div *ngIf="primaryCtaText && primaryCtaLink">
            <a [routerLink]="primaryCtaLink" class="w-full flex items-center justify-center px-8 py-3 metallic-gold text-base font-bold rounded-full md:py-4 md:text-lg transform transition-all hover:scale-105 active:scale-95">
              {{ primaryCtaText }}
            </a>
          </div>
          <div class="mt-3 sm:mt-0" *ngIf="secondaryCtaText && secondaryCtaLink">
            <a [routerLink]="secondaryCtaLink" 
               class="w-full flex items-center justify-center px-8 py-3 border text-base font-bold rounded-full md:py-4 md:text-lg transition-all"
               [ngClass]="bgStyle === 'gradient' ? 'border-wgc-navy-200 text-wgc-navy-900 hover:bg-wgc-navy-50' : 'border-wgc-navy-200 text-wgc-navy-400 hover:bg-wgc-navy-50'">
              {{ secondaryCtaText }}
            </a>
          </div>
        </div>
      </div>
      
      <!-- Visual Content Projection -->
      <div class="mt-12 relative sm:max-w-lg sm:mx-auto lg:mt-0 lg:max-w-none lg:mx-0 lg:col-span-6 lg:flex lg:items-center">
        <ng-content></ng-content>
      </div>
      
    </div>
  </div>
</div>
